version: '3.8'
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: zimplexline_frontend
    volumes:
      - frontend_dist:/output
    networks:
      - zimplexline-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: zimplexline_backend
    env_file:
      - ./backend/.env
    depends_on:
      - db
    networks:
      - zimplexline-net

  db:
    image: postgres:15-alpine
    container_name: zimplexline_db
    environment:
      POSTGRES_DB: zimplexline
      POSTGRES_USER: zimplexlineadmin
      POSTGRES_PASSWORD: Zimplexline@2024Secure
    networks:
      - zimplexline-net

  nginx:
    image: nginx:alpine
    container_name: zimplexline_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend
    networks:
      - zimplexline-net

networks:
  zimplexline-net:
    driver: bridge

volumes:
  frontend_dist:
